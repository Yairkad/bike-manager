// Load all iframes
Object.keys(templates).forEach(k => {
  document.getElementById('t' + k).srcdoc = templates[k]
})

// Auto-resize iframes
document.querySelectorAll('iframe').forEach(iframe => {
  iframe.addEventListener('load', () => {
    try {
      const h = iframe.contentDocument.body.scrollHeight
      iframe.style.height = (h + 20) + 'px'
    } catch(e) {}
  })
})

function copyTemplate(n) {
  const html = templates[n]
  if (navigator.clipboard) {
    navigator.clipboard.writeText(html).then(() => {
      const btn = document.querySelectorAll('.copy-btn')[n - 1]
      btn.textContent = '✓ הועתק!'
      btn.style.background = '#22c55e'
      setTimeout(() => { btn.textContent = 'העתק HTML'; btn.style.background = '#3b82f6' }, 2000)
    })
  }
}
